services:
  - type: web
    name: yt-dlp-audio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: YTDLP_DOWNLOAD_DIR
        value: /tmp
      - key: YTDLP_MAX_DURATION_SECONDS
        value: 1800
      - key: YTDLP_MAX_FILE_MB
        value: 150
      - key: YTDLP_MAX_CONCURRENT_DOWNLOADS
        value: 1
      - key: APP_ACCESS_TOKEN
        sync: false
      # Upstash Redis (REST) — persists cookies across free-tier cold starts.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Optional overrides
      - key: COOKIE_KV_KEY
        sync: false
      - key: ADMIN_COOKIE_PROBE_URL
        sync: false
      - key: YTDLP_PROXY
        sync: false
