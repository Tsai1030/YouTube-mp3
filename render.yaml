services:
  - type: web
    name: yt-dlp-audio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: YTDLP_DOWNLOAD_DIR
        value: /tmp
      - key: YTDLP_MAX_DURATION_SECONDS
        value: 1800
      - key: YTDLP_MAX_FILE_MB
        value: 150
      - key: YTDLP_MAX_CONCURRENT_DOWNLOADS
        value: 1
      - key: APP_ACCESS_TOKEN
        sync: false
